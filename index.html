document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  font-display: swap;\n  src: url(\"534bc88a-03ea-4411-9619-e3b979a26271\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3adcef9a-145d-44db-896a-01fbcc606279\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5d9a4ed7-514a-4fc4-95a8-a013e12f5362\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SIMLI — Landing Page\n   Sistema: serifa editorial + sans humanista + mono estrutural\n   Paleta: creme / areia / blush + rosa primário + ouro discreto\n   ============================================================ */\n\n:root {\n  /* color */\n  --cream:     #F7F1E9;\n  --cream-2:   #FBF7F1;\n  --sand:      #EFE3D5;\n  --blush:     #F4DED7;\n  --blush-2:   #EBC9C1;\n  --ink:       #2C2320;\n  --ink-2:     #4A3E37;\n  --ink-soft:  #7A6C62;\n  --rose:      #A84D63;\n  --rose-deep: #8C3B50;\n  --rose-tint: #C98294;\n  --gold:      #B0823F;\n  --line:      #E4D5C5;\n  --line-2:    #D8C5B2;\n  --white:     #FFFFFF;\n\n  /* type */\n  --serif: \"Cormorant Garamond\", Georgia, serif;\n  --sans:  \"Hanken Grotesk\", system-ui, sans-serif;\n  --mono:  \"DM Mono\", ui-monospace, monospace;\n\n  /* layout */\n  --maxw: 1180px;\n  --gutter: clamp(20px, 5vw, 56px);\n  --radius: 4px;\n  --shadow-sm: 0 1px 2px rgba(44,35,32,.05), 0 8px 24px -16px rgba(44,35,32,.18);\n  --shadow-md: 0 2px 6px rgba(44,35,32,.06), 0 30px 60px -32px rgba(44,35,32,.30);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\n\nbody {\n  font-family: var(--sans);\n  color: var(--ink);\n  background: var(--cream);\n  line-height: 1.6;\n  font-size: 17px;\n  font-weight: 400;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; }\n\n/* ---------- type primitives ---------- */\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 12px;\n  letter-spacing: .22em;\n  text-transform: uppercase;\n  color: var(--rose);\n  font-weight: 500;\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 26px; height: 1px;\n  background: var(--rose-tint);\n  display: inline-block;\n}\n.eyebrow.center::after {\n  content: \"\";\n  width: 26px; height: 1px;\n  background: var(--rose-tint);\n  display: inline-block;\n}\n.eyebrow.center { justify-content: center; }\n\nh1, h2, h3 {\n  font-family: var(--serif);\n  font-weight: 600;\n  line-height: 1.04;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n  text-wrap: balance;\n}\n\n.display {\n  font-size: clamp(38px, 5.8vw, 78px);\n  line-height: 1.1;\n  font-weight: 600;\n}\n.h2 { font-size: clamp(32px, 4.6vw, 56px); }\n.h3 { font-size: clamp(23px, 2.6vw, 30px); }\n\n.lead {\n  font-size: clamp(18px, 1.45vw, 21px);\n  color: var(--ink-2);\n  line-height: 1.55;\n  max-width: 60ch;\n}\n.muted { color: var(--ink-soft); }\nem.serif-em { font-family: var(--serif); font-style: italic; font-size: 1.18em; color: var(--rose); }\n\n/* ---------- layout ---------- */\n.wrap { max-width: var(--maxw); margin-inline: auto; padding-inline: var(--gutter); }\n.section { padding-block: clamp(72px, 9vw, 140px); position: relative; }\n.section.tight { padding-block: clamp(56px, 6vw, 96px); }\n.bg-cream  { background: var(--cream); }\n.bg-cream2 { background: var(--cream-2); }\n.bg-sand   { background: var(--sand); }\n.bg-blush  { background: linear-gradient(180deg, var(--blush) 0%, #F1D6CE 100%); }\n.bg-ink    { background: var(--ink); color: var(--cream); }\n.bg-ink h1, .bg-ink h2, .bg-ink h3 { color: var(--cream-2); }\n\n.divider-top { border-top: 1px solid var(--line); }\n\n.center { text-align: center; }\n.center .lead { margin-inline: auto; }\n\n/* ---------- buttons ---------- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 12px;\n  font-family: var(--sans);\n  font-weight: 600;\n  font-size: 16px;\n  letter-spacing: .01em;\n  padding: 18px 30px;\n  border-radius: 100px;\n  background: var(--rose);\n  color: #fff;\n  transition: transform .18s ease, background .18s ease, box-shadow .18s ease;\n  box-shadow: 0 1px 2px rgba(140,59,80,.2), 0 14px 30px -14px rgba(140,59,80,.55);\n  text-align: center;\n  line-height: 1.2;\n}\n.btn:hover { background: var(--rose-deep); transform: translateY(-2px); box-shadow: 0 2px 4px rgba(140,59,80,.25), 0 22px 40px -16px rgba(140,59,80,.6); }\n.btn:active { transform: translateY(0); }\n.btn .arrow { transition: transform .2s ease; }\n.btn:hover .arrow { transform: translateX(4px); }\n.btn.lg { padding: 22px 40px; font-size: 18px; }\n.btn.ghost {\n  background: transparent;\n  color: var(--ink);\n  box-shadow: inset 0 0 0 1.5px var(--line-2);\n}\n.btn.ghost:hover { background: var(--white); box-shadow: inset 0 0 0 1.5px var(--rose-tint); color: var(--rose-deep); }\n.btn.onink { background: var(--cream); color: var(--ink); box-shadow: 0 14px 30px -14px rgba(0,0,0,.5); }\n.btn.onink:hover { background: #fff; }\n\n.cta-micro {\n  font-family: var(--mono);\n  font-size: 12.5px;\n  letter-spacing: .04em;\n  color: var(--ink-soft);\n  display: inline-flex;\n  gap: 14px;\n  flex-wrap: wrap;\n  align-items: center;\n  justify-content: center;\n}\n.cta-micro span { display: inline-flex; align-items: center; gap: 6px; }\n.cta-micro .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--rose-tint); }\n\n/* ---------- header ---------- */\n.header {\n  position: fixed; inset: 0 0 auto 0; z-index: 100;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 18px var(--gutter);\n  transition: background .3s ease, box-shadow .3s ease, padding .3s ease;\n}\n.header.scrolled {\n  background: rgba(247,241,233,.85);\n  backdrop-filter: blur(14px);\n  box-shadow: 0 1px 0 var(--line);\n  padding-block: 12px;\n}\n.brand { display: flex; align-items: baseline; gap: 10px; }\n.brand .logo {\n  font-family: var(--serif);\n  font-weight: 600;\n  font-size: 27px;\n  letter-spacing: .26em;\n  color: var(--ink);\n  padding-left: .26em;\n}\n.brand .tag {\n  font-family: var(--mono);\n  font-size: 9.5px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--ink-soft);\n  display: none;\n}\n.header-nav { display: flex; align-items: center; gap: 30px; }\n.header-nav a.navlink {\n  font-size: 14.5px; font-weight: 500; color: var(--ink-2);\n  transition: color .15s ease;\n}\n.header-nav a.navlink:hover { color: var(--rose); }\n.header .btn { padding: 12px 24px; font-size: 14.5px; box-shadow: 0 10px 24px -14px rgba(140,59,80,.5); }\n\n/* ---------- hero ---------- */\n.hero {\n  padding-top: clamp(120px, 16vh, 180px);\n  padding-bottom: clamp(60px, 8vw, 110px);\n  position: relative;\n  overflow: hidden;\n}\n.hero-grid {\n  display: grid;\n  grid-template-columns: 1.08fr 0.92fr;\n  gap: clamp(36px, 5vw, 76px);\n  align-items: center;\n}\n.hero h1 { margin: 20px 0 0; }\n.hero .lead { margin-top: 28px; }\n.hero-cta { margin-top: 38px; display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }\n.hero-photo { position: relative; }\n.hero-photo .badge {\n  position: absolute; left: -22px; bottom: 28px;\n  background: var(--white);\n  border-radius: var(--radius);\n  padding: 16px 20px;\n  box-shadow: var(--shadow-md);\n  display: flex; align-items: center; gap: 14px;\n  max-width: 250px;\n}\n.hero-photo .badge .num { font-family: var(--serif); font-size: 42px; line-height: 1; color: var(--rose); font-weight: 600; }\n.hero-photo .badge .lbl { font-size: 13px; line-height: 1.35; color: var(--ink-2); }\n\n/* soft decorative blob */\n.hero::before {\n  content: \"\"; position: absolute;\n  width: 540px; height: 540px;\n  right: -160px; top: -120px;\n  background: radial-gradient(circle, rgba(201,130,148,.22), transparent 68%);\n  pointer-events: none;\n}\n\n/* ---------- placeholder media ---------- */\n.ph {\n  position: relative;\n  background-color: var(--sand);\n  background-image: repeating-linear-gradient(135deg, transparent 0 11px, rgba(168,77,99,.07) 11px 12px);\n  border: 1px solid var(--line-2);\n  border-radius: var(--radius);\n  display: flex; align-items: center; justify-content: center;\n  overflow: hidden;\n}\n.ph .ph-tag {\n  font-family: var(--mono);\n  font-size: 11.5px;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--ink-soft);\n  background: rgba(251,247,241,.82);\n  border: 1px solid var(--line-2);\n  padding: 7px 14px;\n  border-radius: 100px;\n  text-align: center;\n  max-width: 80%;\n  line-height: 1.4;\n}\n.ph.portrait { aspect-ratio: 4 / 5; }\n.ph.square   { aspect-ratio: 1 / 1; }\n.ph.wide     { aspect-ratio: 16 / 10; }\n\n/* real portrait images (reuse placeholder framing) */\n.portrait-img {\n  width: 100%;\n  aspect-ratio: 4 / 5;\n  object-fit: cover;\n  object-position: center 22%;\n  border-radius: var(--radius);\n  border: 1px solid var(--line-2);\n  display: block;\n  background: var(--sand);\n}\n.footer-logo {\n  width: 200px; max-width: 60%;\n  mix-blend-mode: screen;\n  margin: -28px 0 -18px -18px;\n}\n\n/* ---------- value / prose block ---------- */\n.prose-block { max-width: 760px; }\n.prose-block p { font-size: clamp(18px, 1.5vw, 22px); line-height: 1.62; color: var(--ink-2); margin-bottom: 1.15em; }\n.prose-block p:last-child { margin-bottom: 0; }\n.prose-block strong { color: var(--ink); font-weight: 600; }\n.prose-block .kicker {\n  font-family: var(--serif);\n  font-style: italic;\n  font-size: clamp(26px, 3vw, 38px);\n  color: var(--rose);\n  line-height: 1.2;\n  display: block;\n  margin: .3em 0 .55em;\n}\n\n/* ---------- pain checklist ---------- */\n.pain-list { display: grid; gap: 14px; margin-top: 44px; }\n.pain-item {\n  display: flex; align-items: flex-start; gap: 18px;\n  background: var(--cream-2);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 22px 24px;\n  text-align: left;\n  width: 100%;\n  transition: border-color .2s ease, background .2s ease, transform .15s ease;\n}\n.pain-item:hover { border-color: var(--rose-tint); transform: translateX(2px); }\n.pain-item .check {\n  flex: none; width: 26px; height: 26px; margin-top: 1px;\n  border-radius: 50%;\n  border: 1.5px solid var(--line-2);\n  display: grid; place-items: center;\n  transition: all .2s ease;\n}\n.pain-item .check svg { width: 14px; height: 14px; stroke: #fff; opacity: 0; transition: opacity .15s ease; }\n.pain-item.on { background: #fff; border-color: var(--rose); }\n.pain-item.on .check { background: var(--rose); border-color: var(--rose); }\n.pain-item.on .check svg { opacity: 1; }\n.pain-item p { font-size: 16.5px; color: var(--ink-2); line-height: 1.5; }\n.pain-item.on p { color: var(--ink); }\n\n.pain-result {\n  margin-top: 32px;\n  background: var(--ink);\n  color: var(--cream);\n  border-radius: var(--radius);\n  padding: 30px 34px;\n  display: flex; align-items: center; gap: 24px;\n  flex-wrap: wrap;\n  opacity: 0; transform: translateY(10px);\n  transition: opacity .4s ease, transform .4s ease;\n}\n.pain-result.show { opacity: 1; transform: none; }\n.pain-result .count { font-family: var(--serif); font-size: 60px; line-height: 1; color: var(--rose-tint); font-weight: 600; }\n.pain-result .txt { flex: 1; min-width: 240px; }\n.pain-result .txt strong { color: #fff; }\n\n/* ---------- 3-front solution ---------- */\n.fronts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 54px; }\n.front {\n  background: var(--cream-2);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 36px 30px;\n  position: relative;\n}\n.front .n {\n  font-family: var(--serif); font-size: 30px; font-weight: 600; color: var(--rose);\n  display: flex; align-items: baseline; gap: 4px; margin-bottom: 18px;\n}\n.front .n .em { font-size: 15px; font-family: var(--mono); color: var(--ink-soft); letter-spacing: .1em; }\n.front h3 { font-size: 23px; margin-bottom: 10px; }\n.front p { font-size: 16px; color: var(--ink-soft); line-height: 1.55; }\n\n/* ---------- benefits ---------- */\n.benefits { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; margin-top: 54px; background: var(--line); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }\n.benefit {\n  background: var(--cream-2);\n  padding: 36px 36px;\n  display: flex; flex-direction: column; gap: 12px;\n}\n.benefit .bi {\n  width: 40px; height: 40px; border-radius: 50%;\n  background: var(--blush);\n  display: grid; place-items: center;\n  color: var(--rose-deep);\n  font-family: var(--serif); font-size: 21px; font-weight: 600;\n}\n.benefit h3 { font-size: 21px; line-height: 1.12; }\n.benefit p { font-size: 15.5px; color: var(--ink-soft); line-height: 1.55; }\n\n/* ---------- services ---------- */\n.services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 54px; background: var(--line); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }\n.service-col { background: var(--cream-2); padd gin: 54px auto 0;\n  overflow: hidden;\n}\n.offer-card .head {\n  background: var(--ink);\n  color: var(--cream);\n  padding: 34px 40px;\n  display: flex; align-items: center; justify-content: space-between; gap: 20px;\n  flex-wrap: wrap;\n}\n.offer-card .head h3 { color: var(--cream-2); font-size: 28px; }\n.offer-card .head .price-old { font-family: var(--mono); font-size: 14px; color: var(--rose-tint); }\n.offer-card .head .price-old s { opacity: .8; }\n.stack { padding: 14px 40px 8px; }\n.stack-row { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--line); }\n.stack-row:last-child { border-bottom: none; }\n.stack-row .tick { flex: none; width: 24px; height: 24px; border-radius: 50%; background: var(--blush); color: var(--rose-deep); display: grid; place-items: center; }\n.stack-row .tick svg { width: 13px; height: 13px; stroke: var(--rose-deep); }\n.stack-row .item { flex: 1; font-size: 16.5px; color: var(--ink); }\n.stack-row .val { font-family: var(--mono); font-size: 13px; color: var(--ink-soft); letter-spacing: .03em; }\n.offer-card .foot {\n  background: var(--blush);\n  padding: 30px 40px;\n  display: flex; align-items: center; justify-content: space-between; gap: 20px;\n  flex-wrap: wrap;\n}\n.offer-card .foot .total-lbl { font-family: var(--mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); }\n.offer-card .foot .total-val { font-family: var(--serif); font-size: 50px; font-weight: 600; color: var(--rose-deep); line-height: 1; }\n.offer-card .foot .meta { font-family: var(--mono); font-size: 12.5px; color: var(--ink-2); }\n\n/* ---------- objections (accordion-ish grid) ---------- */\n.objections { display: grid; gap: 16px; margin-top: 50px; max-width: 880px; margin-inline: auto; }\n.objection {\n  background: var(--cream-2);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 30px 34px;\n}\n.objection .q { font-family: var(--serif); font-style: italic; font-size: clamp(21px, 2.3vw, 27px); color: var(--ink); display: flex; gap: 14px; line-height: 1.2; }\n.objection .q .mark { font-family: var(--serif); color: var(--rose-tint); font-style: normal; font-size: 1.1em; line-height: 1; flex: none; }\n.objection .a { margin-top: 14px; padding-left: 30px; font-size: 16.5px; color: var(--ink-2); line-height: 1.6; }\n.objection .a strong { color: var(--ink); font-weight: 600; }\n\n/* ---------- guarantee ---------- */\n.guarantee-grid { display: grid; grid-template-columns: 120px 1fr; gap: 40px; align-items: center; max-width: 860px; margin-inline: auto; }\n.seal {\n  width: 120px; height: 120px; border-radius: 50%;\n  background: var(--blush);\n  border: 1.5px solid var(--rose-tint);\n  display: grid; place-items: center; color: var(--rose-deep);\n  flex: none;\n}\n.seal svg { width: 52px; height: 52px; }\n.guarantee-grid p { font-size: 18px; color: var(--ink-2); line-height: 1.6; }\n.guarantee-grid p + p { margin-top: 12px; }\n.guarantee-grid .stamp { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--rose); margin-top: 14px; }\n\n/* ---------- urgency ---------- */\n.urgency-inner { text-align: center; max-width: 720px; margin-inline: auto; }\n.slots {\n  display: inline-flex; gap: 10px; margin: 28px 0;\n  padding: 14px 22px; border-radius: 100px;\n  background: rgba(247,241,233,.08);\n  border: 1px solid rgba(247,241,233,.18);\n  font-family: var(--mono); font-size: 13px; letter-spacing: .05em; color: var(--cream);\n  align-items: center;\n}\n.slots .pulse { width: 9px; height: 9px; border-radius: 50%; background: #67C18C; box-shadow: 0 0 0 0 rgba(103,193,140,.6); animation: pulse 2s infinite; }\n@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(103,193,140,.55)} 70%{box-shadow:0 0 0 12px rgba(103,193,140,0)} 100%{box-shadow:0 0 0 0 rgba(103,193,140,0)} }\n\n/* ---------- FAQ ---------- */\n.faq { max-width: 820px; margin: 50px auto 0; border-top: 1px solid var(--line-2); }\n.faq-item { border-bottom: 1px solid var(--line-2); }\n.faq-q {\n  width: 100%; text-align: left;\n  display: flex; align-items: center; justify-content: space-between; gap: 24px;\n  padding: 26px 4px;\n  font-family: var(--serif); font-size: clamp(20px, 2.2vw, 25px); font-weight: 600; color: var(--ink);\n}\n.faq-q .ic { flex: none; width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--line-2); display: grid; place-items: center; transition: all .25s ease; position: relative; }\n.faq-q .ic::before, .faq-q .ic::after { content: \"\"; position: absolute; background: var(--rose); border-radius: 2px; transition: transform .25s ease, opacity .25s ease; }\n.faq-q .ic::before { width: 12px; height: 1.8px; }\n.faq-q .ic::after  { width: 1.8px; height: 12px; }\n.faq-item.open .faq-q .ic { background: var(--rose); border-color: var(--rose); }\n.faq-item.open .faq-q .ic::before { background: #fff; }\n.faq-item.open .faq-q .ic::after { transform: scaleY(0); }\n.faq-a { max-height: 0; overflow: hidden; transition: max-height .35s ease; }\n.faq-a .faq-a-inner { padding: 0 4px 28px; font-size: 16.5px; color: var(--ink-2); line-height: 1.65; max-width: 92%; }\n.faq-a .faq-a-inner strong { color: var(--ink); }\n\n/* ---------- final CTA ---------- */\n.finalcta { text-align: center; }\n.finalcta .prose-block { margin-inline: auto; }\n.finalcta .prose-block p { color: var(--cream); opacity: .92; }\n.finalcta .prose-block strong { color: #fff; }\n\n/* ---------- PS ---------- */\n.ps {\n  max-width: 760px; margin-inline: auto;\n  border-left: 3px solid var(--rose-tint);\n  padding: 6px 0 6px 30px;\n}\n.ps .ps-label { font-family: var(--mono); font-size: 13px; letter-spacing: .12em; color: var(--rose); font-weight: 500; }\n.ps p { font-size: 18px; color: var(--ink-2); line-height: 1.62; margin-top: 12px; }\n\n/* ---------- footer ---------- */\n.footer { background: var(--ink); color: var(--cream); padding-block: clamp(56px, 7vw, 88px); }\n.footer .wrap { display: grid; gap: 40px; }\n.footer-top { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; align-items: flex-start; }\n.footer .logo { font-family: var(--serif); font-size: 30px; letter-spacing: .26em; padding-left: .26em; color: var(--cream-2); }\n.footer .desc { font-size: 14.5px; color: rgba(247,241,233,.6); max-width: 380px; margin-top: 14px; line-height: 1.6; }\n.footer-links { display: flex; gap: 30px; flex-wrap: wrap; }\n.footer-links a { font-size: 14px; color: rgba(247,241,233,.75); transition: color .15s ease; }\n.footer-links a:hover { color: var(--rose-tint); }\n.lgpd-note {\n  font-family: var(--mono); font-size: 11.5px; line-height: 1.7;\n  color: rgba(247,241,233,.42);\n  border-top: 1px solid rgba(247,241,233,.12);\n  padding-top: 28px;\n}\n.footer .copy { font-size: 13px; color: rgba(247,241,233,.45); }\n\n/* ---------- scheduling modal ---------- */\n.modal-overlay {\n  position: fixed; inset: 0; z-index: 200;\n  background: rgba(44,35,32,.55);\n  backdrop-filter: blur(4px);\n  display: flex; align-items: center; justify-content: center;\n  padding: 20px;\n  opacity: 0; visibility: hidden;\n  transition: opacity .3s ease, visibility .3s ease;\n}\n.modal-overlay.open { opacity: 1; visibility: visible; }\n.modal {\n  background: var(--cream);\n  border-radius: 10px;\n  width: min(520px, 100%);\n  max-height: 92vh; overflow-y: auto;\n  box-shadow: 0 40px 90px -30px rgba(0,0,0,.5);\n  transform: translateY(16px) scale(.98);\n  transition: transform .3s ease;\n  position: relative;\n}\n.modal-overlay.open .modal { transform: none; }\n.modal-head { padding: 36px 40px 8px; }\n.modal-head .eyebrow { margin-bottom: 16px; }\n.modal-head h3 { font-size: 30px; }\n.modal-head p { font-size: 15px; color: var(--ink-soft); margin-top: 8px; }\n.modal-close {\n  position: absolute; top: 18px; right: 18px;\n  width: 38px; height: 38px; border-radius: 50%;\n  display: grid; place-items: center; color: var(--ink-2);\n  transition: background .15s ease;\n}\n.modal-close:hover { background: var(--sand); }\n.modal-form { padding: 20px 40px 40px; display: grid; gap: 18px; }\n/* ---------- Brevo form embed ---------- */\n.brevo-embed { position: relative; padding: 8px 0 0; min-height: 360px; }\n.brevo-frame { display: block; width: 100%; min-height: 540px; height: 62vh; max-height: 640px; border: 0; background: var(--cream); }\n.brevo-loading {\n  position: absolute; inset: 8px 0 0 0;\n  display: grid; place-items: center;\n  font-family: var(--mono); font-size: 12.5px; letter-spacing: .04em; color: var(--ink-soft);\n  pointer-events: none;\n}\n.modal-alt { padding: 4px 40px 18px; }\n.modal-or { display: flex; align-items: center; gap: 16px; margin: 6px 0 20px; color: var(--ink-soft); }\n.modal-or::before, .modal-or::after { content: \"\"; height: 1px; flex: 1; background: var(--line); }\n.modal-or span { font-family: var(--mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; }\n.modal-alt .btn.ghost { width: 100%; }\n.modal-alt-note { text-align: center; margin-top: 10px; font-size: 12.5px; color: var(--ink-soft); }\n.modal-alt-note a { color: var(--rose); text-decoration: underline; font-weight: 600; }\n.field { display: grid; gap: 7px; }\n.field label { font-size: 13px; font-weight: 600; color: var(--ink-2); letter-spacing: .01em; }\n.field input, .field select {\n  font-family: var(--sans); font-size: 16px; color: var(--ink);\n  padding: 14px 16px;\n  background: var(--white);\n  border: 1.5px solid var(--line-2);\n  border-radius: var(--radius);\n  transition: border-color .15s ease, box-shadow .15s ease;\n  width: 100%;\n}\n.field input:focus, .field select:focus { outline: none; border-color: var(--rose); box-shadow: 0 0 0 3px rgba(168,77,99,.12); }\n.field.err input, .field.err select { border-color: #C0392B; }\n.field .errmsg { font-size: 12px; color: #C0392B; display: none; }\n.field.err .errmsg { display: block; }\n.consent { display: flex; gap: 12px; align-items: flex-start; }\n.consent input { widt
